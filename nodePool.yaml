apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        name: default

      requirements:
        - key: "kubernetes.io/arch"
          operator: In
          values: ["amd64"]

        - key: "node.kubernetes.io/instance-type"
          operator: In
          values: ["t3.medium"]

        - key: "karpenter.sh/capacity-type"
          operator: In
          values: ["spot", "on-demand"]

  limits:
    cpu: "10"
    memory: "50Gi"

  disruption:
    consolidationPolicy: WhenUnderutilized

  weight: 10
