<!DOCTYPE html>
<html>
<head>
  <title>Incidents Dashboard</title>
</head>
<body>
  <h1>Incidents Dashboard</h1>

  <button onclick="call('/api/data')">Get Data</button>
  <button onclick="call('/api/db-stress')">DB Stress</button>
  <button onclick="call('/api/slow')">Slow API</button>
  <button onclick="call('/api/random-fail')">Random Fail</button>
  <button onclick="call('/api/cache-break')">Clear Cache</button>

  <pre id="output"></pre>

  <script>
    async function call(endpoint) {
      try {
        const res = await fetch(endpoint);
        const data = await res.json();
        document.getElementById("output").innerText =
          JSON.stringify(data, null, 2);
      } catch (e) {
        document.getElementById("output").innerText = e;
      }
    }
  </script>
</body>
</html>
