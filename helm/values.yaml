backend:
  replicaCount: 3
  image:
    repository: nareshchandanbatve/eks-app
    tag: backend-latest
    pullPolicy: IfNotPresent
  port: 8000

frontend:
  image:
    repository: nareshchandanbatve/eks-app
    tag: frontend-latest
  replicaCount: 2
  port: 3000

postgres:
  image: postgres:14
  password: password
  port: 5432

redis:
  image: redis:7
  port: 6379

ingress:
  enabled: true
  className: "nginx"
  annotations: 
    cert-manager.io/cluster-issuer: "selfsigned"
  hosts:
    - host: ""
      paths:
        - path: "/"
          pathType: Prefix
  tls: 
    - secretName: app-tls
      hosts:
        - ""

imagePullSecrets:
  - name: registry-secret
