apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2
  instanceProfile: karpenter-instance-profile

  subnetSelectorTerms:
    - tags:
        kubernetes.io/cluster/dev-eks-cluster: shared

  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/dev-eks-cluster: shared

  tags:
    Name: karpenter-node